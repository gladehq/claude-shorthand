name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install llmlingua --quiet

      - name: Validate config.json
        run: python3 -c "import json; json.load(open('config.json')); print('config.json is valid')"

      - name: Validate shell scripts
        run: |
          bash -n install.sh   && echo "install.sh syntax OK"
          bash -n uninstall.sh && echo "uninstall.sh syntax OK"

      - name: Test short prompt passes through unchanged
        run: |
          RESULT=$(echo '{"prompt": "short prompt"}' | python3 bin/compress.py)
          python3 -c "
          import json
          data = json.loads('$RESULT')
          assert data['prompt'] == 'short prompt', f'Expected passthrough, got: {data}'
          print('Short prompt passthrough: OK')
          "

      - name: Test long prompt is compressed
        run: |
          LONG=$(python3 -c "print('x ' * 500)")
          ORIG_LEN=${#LONG}
          RESULT=$(echo "{\"prompt\": \"$LONG\"}" | python3 bin/compress.py)
          COMP_LEN=$(echo "$RESULT" | python3 -c "import sys,json; print(len(json.load(sys.stdin)['prompt']))")
          if [ "$COMP_LEN" -lt "$ORIG_LEN" ]; then
            echo "Long prompt compressed: OK ($COMP_LEN chars < $ORIG_LEN chars)"
          else
            echo "FAIL: Expected compression, orig=$ORIG_LEN result=$COMP_LEN"
            exit 1
          fi

      - name: Test disabled state passes through unchanged
        run: |
          PLUGIN_DIR=/tmp/shorthand-test
          mkdir -p "$PLUGIN_DIR/.claude/plugins/shorthand/bin"
          echo '{"enabled": "off"}' > "$PLUGIN_DIR/.claude/plugins/shorthand/bin/state.json"
          LONG=$(python3 -c "print('x ' * 500)")
          ORIG_LEN=${#LONG}
          RESULT=$(echo "{\"prompt\": \"$LONG\"}" | HOME="$PLUGIN_DIR" python3 bin/compress.py)
          COMP_LEN=$(echo "$RESULT" | python3 -c "import sys,json; print(len(json.load(sys.stdin)['prompt']))")
          THRESHOLD=$((ORIG_LEN * 95 / 100))
          if [ "$COMP_LEN" -ge "$THRESHOLD" ]; then
            echo "Disabled state passthrough: OK"
          else
            echo "FAIL: Expected passthrough when disabled, orig=$ORIG_LEN result=$COMP_LEN"
            exit 1
          fi
